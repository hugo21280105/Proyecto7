<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0c111b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arcana Tap" />
  <title>Arcana Tap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Arcana Tap</h1>
        <p id="runStatus" class="subtitle">Run 1</p>
      </div>
      <button id="menuBtn" class="icon-btn" type="button" aria-label="Abrir menu">☰</button>
    </header>

    <section class="hud-grid" aria-label="Estadisticas">
      <article class="hud-card"><span>Oro</span><strong id="gold">0</strong></article>
      <article class="hud-card"><span>Golpe</span><strong id="tapDamage">1</strong></article>
      <article class="hud-card"><span>DPS</span><strong id="dps">0</strong></article>
      <article class="hud-card"><span>Esencias</span><strong id="shards">0</strong></article>
      <article class="hud-card"><span>Combo</span><strong id="combo">x1.00</strong></article>
      <article class="hud-card"><span>Crit</span><strong id="critChance">0%</strong></article>
      <article class="hud-card"><span>Bosses</span><strong id="bosses">0</strong></article>
      <article class="hud-card"><span>Cartas</span><strong id="cards">0</strong></article>
    </section>

    <section class="arena">
      <div class="arena-head">
        <div>
          <h2 id="enemyName">Slime del Sotano</h2>
          <p id="enemyMeta" class="enemy-meta">Normal</p>
        </div>
        <span id="stage" class="stage-pill">Sala 1</span>
      </div>

      <div class="bar-wrap">
        <div id="hpBar" class="hp-bar"></div>
      </div>
      <p id="hpText" class="bar-text">22 / 22</p>

      <div class="bar-wrap overdrive-wrap">
        <div id="overdriveBar" class="overdrive-bar"></div>
      </div>
      <p id="overdriveText" class="bar-text blue">Overdrive 0%</p>

      <p id="combatLog" class="combat-log"></p>
    </section>

    <section class="action-row">
      <button id="attackBtn" type="button" class="action action-main">
        <span>GOLPEAR</span>
        <small id="attackPreview">+1</small>
      </button>
      <button id="furyBtn" type="button" class="action action-skill">
        <span>FURIA</span>
        <small id="furyText">Lista</small>
      </button>
    </section>

    <nav class="tabs" aria-label="Menus">
      <button type="button" class="tab-btn active" data-tab="shop">Tienda</button>
      <button type="button" class="tab-btn" data-tab="cards">Cartas</button>
      <button type="button" class="tab-btn" data-tab="relics">Reliquias</button>
      <button type="button" class="tab-btn" data-tab="quests">Misiones</button>
      <button type="button" class="tab-btn" data-tab="meta">Taller</button>
    </nav>

    <section class="panels">
      <section class="panel active" data-panel="shop"><div id="shopList" class="list"></div></section>
      <section class="panel" data-panel="cards"><div id="cardList" class="list"></div></section>
      <section class="panel" data-panel="relics"><div id="relicList" class="list"></div></section>
      <section class="panel" data-panel="quests"><div id="questList" class="list"></div></section>
      <section class="panel" data-panel="meta"><div id="metaList" class="list"></div></section>
    </section>
  </main>

  <dialog id="menuDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <h3>Menu de Run</h3>
      <div class="list compact">
        <button type="button" id="newRunBtn" class="menu-btn">Nueva run (mantiene progreso permanente)</button>
        <button type="button" id="forceCardBtn" class="menu-btn">Forzar draft de carta</button>
        <button type="button" id="forceRelicBtn" class="menu-btn">Forzar draft de reliquia</button>
      </div>
      <button class="menu-btn close" value="close">Cerrar</button>
    </form>
  </dialog>

  <dialog id="draftDialog" class="dialog">
    <form method="dialog" class="dialog-card">
      <h3 id="draftTitle">Elige</h3>
      <p id="draftSubtitle" class="subtitle">Selecciona 1 opcion</p>
      <div id="draftChoices" class="list compact"></div>
      <button class="menu-btn close" value="cancel">Cancelar</button>
    </form>
  </dialog>

  <script src="script.js" defer></script>
</body>
</html>
